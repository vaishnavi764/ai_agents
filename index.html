<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Transcription</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .record-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .record-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .record-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }

        .record-btn.recording {
            background: #ff4757;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .stop-btn {
            background: #747d8c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            box-shadow: 0 4px 15px rgba(116, 125, 140, 0.3);
        }

        .stop-btn:hover {
            transform: scale(1.05);
            background: #57606f;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 15px 30px;
            background: #5f27cd;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px dashed transparent;
        }

        .file-input-label:hover {
            background: #4834d4;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(95, 39, 205, 0.3);
        }

        .transcribe-btn {
            background: #00d2d3;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .transcribe-btn:hover {
            background: #00a3a4;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 210, 211, 0.3);
        }

        .transcribe-btn:disabled {
            background: #ddd;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status {
            text-align: center;
            margin: 20px 0;
            padding: 10px;
            border-radius: 10px;
            font-weight: 500;
        }

        .status.info {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.success {
            background: #e8f5e8;
            color: #2e7d32;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
        }

        .transcription-result {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            min-height: 100px;
            font-size: 16px;
            line-height: 1.6;
        }

        .transcription-result.empty {
            color: #6c757d;
            font-style: italic;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .audio-preview {
            margin: 15px 0;
            text-align: center;
        }

        .audio-preview audio {
            width: 100%;
            max-width: 400px;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Audio Transcription</h1>
        
        <div class="record-section">
            <h3>Record Audio</h3>
            <div>
                <button id="recordBtn" class="record-btn" title="Start Recording">🎤</button>
                <button id="stopBtn" class="stop-btn" title="Stop Recording" style="display: none;">⏹</button>
            </div>
            <div id="audioPreview" class="audio-preview"></div>
        </div>

        <div class="upload-section">
            <h3>Or Upload Audio File</h3>
            <div class="file-input-wrapper">
                <input type="file" id="audioFile" class="file-input" accept="audio/*" />
                <label for="audioFile" class="file-input-label">
                    📁 Choose Audio File (MP3, WAV, M4A, etc.)
                </label>
            </div>
            <button id="transcribeBtn" class="transcribe-btn" disabled>
                🔤 Transcribe Audio
            </button>
        </div>

        <div id="status" class="status" style="display: none;"></div>

        <div class="transcription-result empty" id="transcriptionResult">
            Transcription will appear here...
        </div>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const audioFile = document.getElementById('audioFile');
        const transcribeBtn = document.getElementById('transcribeBtn');
        const status = document.getElementById('status');
        const transcriptionResult = document.getElementById('transcriptionResult');
        const audioPreview = document.getElementById('audioPreview');

        let mediaRecorder;
        let recordedChunks = [];
        let currentAudioBlob = null;

        // Server URL - adjust if needed
        const SERVER_URL = 'http://localhost:5000';

        // Recording functionality
        recordBtn.addEventListener('click', startRecording);
        stopBtn.addEventListener('click', stopRecording);
        audioFile.addEventListener('change', handleFileSelect);
        transcribeBtn.addEventListener('click', transcribeAudio);

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                recordedChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    currentAudioBlob = new Blob(recordedChunks, { type: 'audio/wav' });
                    createAudioPreview(currentAudioBlob);
                    transcribeBtn.disabled = false;
                    updateStatus('Recording saved! Ready to transcribe.', 'success');
                };

                mediaRecorder.start();
                recordBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                recordBtn.classList.add('recording');
                updateStatus('Recording in progress...', 'info');
                
            } catch (error) {
                console.error('Error accessing microphone:', error);
                updateStatus('Error accessing microphone. Please check permissions.', 'error');
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
            
            recordBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
            recordBtn.classList.remove('recording');
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                currentAudioBlob = file;
                createAudioPreview(file);
                transcribeBtn.disabled = false;
                updateStatus('File selected! Ready to transcribe.', 'success');
            }
        }

        function createAudioPreview(audioBlob) {
            const audioUrl = URL.createObjectURL(audioBlob);
            audioPreview.innerHTML = `
                <audio controls>
                    <source src="${audioUrl}" type="audio/wav">
                    Your browser does not support the audio element.
                </audio>
            `;
        }

        async function transcribeAudio() {
            if (!currentAudioBlob) {
                updateStatus('No audio file selected or recorded.', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', currentAudioBlob, 'recording.wav');

            transcribeBtn.disabled = true;
            updateStatus('<span class="loading-spinner"></span>Transcribing audio... This may take a moment.', 'info');
            transcriptionResult.innerHTML = 'Processing...';
            transcriptionResult.classList.remove('empty');

            try {
                const response = await fetch(`${SERVER_URL}/transcribe/file`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    transcriptionResult.innerHTML = result.transcription || 'No transcription available.';
                    updateStatus(`Transcription completed! Language detected: ${result.language}`, 'success');
                } else {
                    throw new Error(result.error || 'Transcription failed');
                }

            } catch (error) {
                console.error('Transcription error:', error);
                updateStatus(`Error: ${error.message}`, 'error');
                transcriptionResult.innerHTML = 'Transcription failed. Please try again.';
                transcriptionResult.classList.add('empty');
            } finally {
                transcribeBtn.disabled = false;
            }
        }

        function updateStatus(message, type) {
            status.innerHTML = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
        }

        // Check server connection on load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${SERVER_URL}/health`);
                if (response.ok) {
                    updateStatus('Connected to transcription server!', 'success');
                    setTimeout(() => {
                        status.style.display = 'none';
                    }, 3000);
                }
            } catch (error) {
                updateStatus('Cannot connect to server. Make sure the Python server is running on port 5000.', 'error');
            }
        });
    </script>
</body>
</html>
