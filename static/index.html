<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS Demo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        audio {
            width: 100%;
            margin-top: 10px;
        }
        .loading {
            text-align: center;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Text-to-Speech Demo</h1>
        
        <form id="ttsForm">
            <div class="form-group">
                <label for="text">Text to Convert:</label>
                <textarea id="text" rows="4" placeholder="Enter the text you want to convert to speech..." required></textarea>
            </div>
            
            <div class="form-group">
                <label for="voice">Voice:</label>
                <select id="voice">
                    <option value="en-US-ken">Ken (US English)</option>
                    <option value="en-US-sarah">Sarah (US English)</option>
                    <option value="en-GB-james">James (British English)</option>
                </select>
            </div>
            
            <button type="submit" id="generateBtn">🎵 Generate Speech</button>
        </form>
        
        <div id="result" class="result">
            <div id="resultContent"></div>
        </div>
    </div>

    <script>
        document.getElementById('ttsForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const text = document.getElementById('text').value;
            const voice = document.getElementById('voice').value;
            const resultDiv = document.getElementById('result');
            const resultContent = document.getElementById('resultContent');
            const generateBtn = document.getElementById('generateBtn');
            
            // Show loading
            generateBtn.disabled = true;
            generateBtn.textContent = '🔄 Generating...';
            resultDiv.style.display = 'block';
            resultDiv.className = 'result loading';
            resultContent.innerHTML = '⏳ Converting text to speech...';
            
            try {
                const response = await fetch('/generate-tts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text: text,
                        voice_id: voice,
                        rate: "0",
                        pitch: "0",
                        volume: "0"
                    })
                });
                
                const data = await response.json();
                
                if (data.success && data.audio_url) {
                    resultDiv.className = 'result success';
                    resultContent.innerHTML = `
                        <strong>✅ Success!</strong> Audio generated successfully!<br>
                        <audio controls>
                            <source src="${data.audio_url}" type="audio/mpeg">
                            Your browser does not support the audio element.
                        </audio>
                        <br><small>Audio URL: <a href="${data.audio_url}" target="_blank">${data.audio_url}</a></small>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultContent.innerHTML = `<strong>❌ Error:</strong> ${data.message || 'Failed to generate audio'}`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultContent.innerHTML = `<strong>❌ Network Error:</strong> ${error.message}`;
            }
            
            // Reset button
            generateBtn.disabled = false;
            generateBtn.textContent = '🎵 Generate Speech';
        });
    </script>
</body>
</html>
