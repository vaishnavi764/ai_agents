version: '3.8'

services:
  tts-server:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MURF_API_KEY=${MURF_API_KEY}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3